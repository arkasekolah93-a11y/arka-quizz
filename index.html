<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Kuis Arka Belajar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Fredoka', sans-serif; 
      background-color: #7dd3fc; 
      background-image: linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.2) 75%, rgba(255,255,255,0.2)), 
                        linear-gradient(45deg, rgba(255,255,255,0.2) 25%, transparent 25%, transparent 75%, rgba(255,255,255,0.2) 75%, rgba(255,255,255,0.2)); 
      background-size: 60px 60px; 
      color: #1e293b; 
      min-height: 100vh; 
      overflow-x: hidden; 
      display: flex; 
      flex-direction: column; 
    }
    
    /* Header Style */
    .header { background: #4ade80; padding: 1rem; display: flex; justify-content: center; align-items: center; border-bottom: 8px solid #713f12; border-top: 4px solid #bbf7d0; position: sticky; top: 0; z-index: 50; }
    .header h1 { font-family: 'Press Start 2P', cursive; font-size: 1.2rem; color: white; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; letter-spacing: 1px; text-align: center; cursor: pointer;}
    
    .container { padding: 1.5rem; width: 100%; max-width: 800px; margin: 0 auto; flex: 1; display: flex; flex-direction: column; }
    
    /* Neo-Brutalism Cards */
    .card { background: #fff; border-radius: 15px; padding: 1.5rem; border: 4px solid #000; box-shadow: 6px 6px 0 rgba(0,0,0,0.8); margin-bottom: 1.5rem; transition: all 0.1s;}
    .card-header { font-family: 'Press Start 2P', cursive; font-size: 0.8rem; margin-bottom: 1.2rem; padding-bottom: 0.8rem; border-bottom: 3px dashed #cbd5e1; display: flex; align-items: center; gap: 10px; }
    
    /* Form Inputs */
    .form-group { margin-bottom: 1.2rem; }
    .form-label { display: block; font-weight: 700; margin-bottom: 0.5rem; font-size: 0.9rem; text-transform: uppercase; }
    .form-select, .form-input { width: 100%; padding: 0.8rem; border-radius: 8px; border: 3px solid #000; font-family: 'Fredoka', sans-serif; font-size: 1rem; font-weight: 600; outline: none; background: #f8fafc; cursor: pointer; box-shadow: 3px 3px 0 #000; transition: all 0.1s;}
    .form-select:focus, .form-input:focus { background: #fff; transform: translate(2px, 2px); box-shadow: 1px 1px 0 #000; }
    
    /* Buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.8rem 1.2rem; border-radius: 10px; font-weight: 700; font-size: 1rem; cursor: pointer; border: 4px solid #000; transition: all 0.1s; text-transform: uppercase; width: 100%; font-family: 'Fredoka', sans-serif; }
    .btn:active:not(:disabled) { transform: translate(4px, 4px); box-shadow: 0 0 0 #000; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: 4px 4px 0 #000; }
    
    .btn-primary { background: #fde047; color: #000; box-shadow: 4px 4px 0 #000; }
    .btn-success { background: #4ade80; color: #000; box-shadow: 4px 4px 0 #000; }
    
    /* Radio/Grid Cards */
    .radio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 0.8rem; }
    .radio-card label { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.8rem; border: 3px solid #000; border-radius: 10px; cursor: pointer; font-weight: 700; background: #f8fafc; box-shadow: 3px 3px 0 #000; transition: all 0.1s; text-align: center; height: 100%; }
    .radio-card input[type="radio"] { display: none; }
    .radio-card input[type="radio"]:checked + label { background: #93c5fd; transform: translate(3px, 3px); box-shadow: 0 0 0 #000; }
    
    /* Screens */
    #playScreen, #resultScreen { display: none; flex-direction: column; gap: 1rem; height: 100%; }
    
    /* HUD & Timer */
    .hud-bar { background: #1e293b; color: white; border: 4px solid #000; border-radius: 12px; padding: 1rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 4px 4px 0 #000; }
    .hud-info span { display: block; }
    .timer-box { background: #ef4444; padding: 0.5rem 1rem; border-radius: 8px; border: 2px solid #000; font-family: 'Press Start 2P', cursive; font-size: 1rem; }
    
    /* Question Card */
    .q-card { flex: 1; background: #fff; border: 4px solid #000; border-radius: 15px; padding: 1.5rem; box-shadow: 6px 6px 0 #000; display: flex; flex-direction: column; }
    /* Penyesuaian font agar huruf Arab terlihat jelas dan besar */
    .q-text { font-size: 1.8rem; font-weight: 700; text-align: center; margin-bottom: 2rem; line-height: 1.6; flex: 1; display: flex; align-items: center; justify-content: center; direction: rtl; }
    
    .opt-btn { width: 100%; text-align: left; padding: 1rem; border: 3px solid #000; border-radius: 10px; background: #f8fafc; font-size: 1.3rem; font-weight: 700; cursor: pointer; transition: all 0.1s; margin-bottom: 0.8rem; box-shadow: 4px 4px 0 #000; direction: rtl; display: flex; gap: 10px; align-items: center;}
    .opt-btn:active:not(:disabled) { transform: translate(3px, 3px); box-shadow: 1px 1px 0 #000; }
    .opt-btn.correct { background: #4ade80; color: #000; }
    .opt-btn.wrong { background: #fca5a5; color: #000; }
    
    .feedback-box { margin-top: 1rem; padding: 1rem; border: 3px solid #000; border-radius: 10px; font-weight: 700; text-align: center; display: none; font-size: 1.2rem;}
    
    /* Utilities */
    .hidden { display: none !important; }
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #1e293b; color: white; padding: 10px 20px; border-radius: 8px; border: 3px solid #000; font-weight: 700; display: none; z-index: 100; text-align: center; box-shadow: 4px 4px 0 #000;}
  </style>
</head>
<body>

  <div class="header">
    <h1 onclick="kembaliKeMenu()">KUIS ARKA</h1>
  </div>

  <div class="container">
    
    <!-- HALAMAN SETUP / PENGATURAN -->
    <div id="setupScreen">
      
      <div id="cardPilihMateri" class="card">
        <div class="card-header"><i class="fas fa-book text-blue-500"></i> Pilih Materi</div>
        
        <div class="form-group">
          <span class="form-label">Mata Pelajaran</span>
          <select id="selectMapel" class="form-select" onchange="updateDropdownBab()">
            <option value="">-- Pilih Mata Pelajaran --</option>
            <!-- Diisi oleh JavaScript -->
          </select>
        </div>

        <div class="form-group">
          <span class="form-label">Bab / Topik</span>
          <select id="selectBab" class="form-select">
            <option value="">-- Pilih Bab --</option>
            <!-- Diisi oleh JavaScript -->
          </select>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><i class="fas fa-gamepad text-green-500"></i> Pengaturan Bermain</div>
        
        <div class="form-group">
          <span class="form-label">Mode Permainan</span>
          <div class="radio-grid" style="grid-template-columns: 1fr 1fr;">
            <div class="radio-card"><input type="radio" id="m_latihan" name="mode" value="latihan" checked><label for="m_latihan"><i class="fas fa-coffee" style="font-size: 1.5rem; color:#b45309"></i> Latihan</label></div>
            <div class="radio-card"><input type="radio" id="m_kuis" name="mode" value="kuis"><label for="m_kuis"><i class="fas fa-stopwatch" style="font-size: 1.5rem; color:#ef4444"></i> Kuis (Waktu)</label></div>
          </div>
        </div>

        <div class="form-group">
          <span class="form-label">Jumlah Soal</span>
          <div class="radio-grid">
            <div class="radio-card"><input type="radio" id="j_5" name="jumlah" value="5" checked onchange="toggleBebas()"><label for="j_5">5</label></div>
            <div class="radio-card"><input type="radio" id="j_10" name="jumlah" value="10" onchange="toggleBebas()"><label for="j_10">10</label></div>
            <div class="radio-card"><input type="radio" id="j_bebas" name="jumlah" value="bebas" onchange="toggleBebas()"><label for="j_bebas">Bebas</label></div>
          </div>
          <input type="number" id="inputBebas" class="form-input hidden" placeholder="Ketik jumlah soal..." style="margin-top: 0.8rem;" min="1">
        </div>
        
        <button class="btn btn-primary" onclick="mulaiMain()" style="margin-top: 1rem; padding: 1rem; font-size: 1.2rem;">
          <i class="fas fa-play"></i> MULAI SEKARANG
        </button>
      </div>
    </div>

    <!-- HALAMAN BERMAIN -->
    <div id="playScreen">
      <div class="hud-bar">
        <div class="hud-info">
          <span style="font-size: 0.7rem; color: #94a3b8; font-weight: 700; text-transform: uppercase;">Progres</span>
          <span style="font-size: 1.2rem; font-weight: 700;"><span id="hudNomor">1</span>/<span id="hudTotal">10</span></span>
        </div>
        <div id="timerContainer" class="timer-box">--:--</div>
      </div>
      
      <div class="q-card">
        <div id="teksSoal" class="q-text">Pertanyaan...</div>
        <div id="areaOpsi"></div>
        <div id="kotakUmpanBalik" class="feedback-box"></div>
      </div>
      
      <button id="btnLanjut" class="btn btn-success hidden" onclick="soalSelanjutnya()">LANJUT <i class="fas fa-arrow-right"></i></button>
    </div>

    <!-- HALAMAN HASIL -->
    <div id="resultScreen">
      <div class="card" style="text-align: center; padding: 3rem 1.5rem;">
        <i class="fas fa-trophy" style="font-size: 5rem; color: #fde047; text-shadow: 4px 4px 0 #000; margin-bottom: 1rem;"></i>
        <h2 style="font-family: 'Press Start 2P', cursive; margin-bottom: 1rem; line-height: 1.4;">SELESAI!</h2>
        
        <div style="background: #f8fafc; border: 4px solid #000; border-radius: 15px; padding: 2rem; margin-bottom: 2rem; box-shadow: 4px 4px 0 #000;">
          <span style="font-weight: 700; color: #64748b; text-transform: uppercase;">Skor Kamu</span>
          <div id="skorAkhir" style="font-size: 4rem; font-weight: 900; color: #3b82f6;">100</div>
          <p style="font-weight: 700; margin-top: 10px; font-size: 1.2rem;">Benar <span id="benarAkhir" style="color: #16a34a;">0</span> dari <span id="totalAkhir">0</span></p>
        </div>
        
        <button class="btn btn-primary" onclick="kembaliKeMenu()" style="padding: 1rem;">
          <i class="fas fa-home"></i> MAIN LAGI
        </button>
      </div>
    </div>

  </div>

  <div id="toast"></div>

  <script>
    // =========================================================================
    // DATABASE BANK SOAL MANUAL (PASTE SOAL DARI AI KE SINI)
    // =========================================================================
    const BANK_SOAL = [
      {
        "mapel": "Bahasa Arab",
        "bab": "Bab 1: Rukun Islam",
        "soal": "مِنْ شُرُوْطِ الْإِسْلَامِ ... الشَّهَادَتَيْنِ",
        "opsi": ["إِقْرَارُ", "إِنْكَارُ", "تَرْكُ", "نِسْيَانُ"],
        "jawaban": "إِقْرَارُ"
      },
      {
        "mapel": "Bahasa Arab",
        "bab": "Bab 1: Rukun Islam",
        "soal": "أَرْكَانُ الْإِسْلَامِ ...",
        "opsi": ["ثَلَاثَةٌ", "أَرْبَعَةٌ", "خَمْسَةٌ", "سِتَّةٌ"],
        "jawaban": "خَمْسَةٌ"
      },
      {
        "mapel": "Bahasa Arab",
        "bab": "Bab 1: Rukun Islam",
        "soal": "وَالشَّهَادَةُ رُكْنٌ مِنْ أَرْكَانِ ...",
        "opsi": ["الْإِيْمَانِ", "الْإِسْلَامِ", "الْإِحْسَانِ", "الصَّلَاةِ"],
        "jawaban": "الْإِسْلَامِ"
      },
      {
        "mapel": "Bahasa Arab",
        "bab": "Bab 1: Rukun Islam",
        "soal": "مَاذَا تَفْعَلُ بَعْدَ صَلَاةِ الصُّبْحِ؟ ... الْقُرْآنَ",
        "opsi": ["أَقْرَأُ", "أَكْتُبُ", "أَنَامُ", "أَلْعَبُ"],
        "jawaban": "أَقْرَأُ"
      },
      {
        "mapel": "Matematika",
        "bab": "Bab 1: Penjumlahan",
        "soal": "Berapakah hasil dari 15 + 12?",
        "opsi": ["25", "27", "28", "30"],
        "jawaban": "27"
      }
      // Bapak bisa menambahkan kurung kurawal baru di bawah ini jika ada soal baru
    ];

    let sesiSoal = [];
    let indexSoal = 0;
    let skor = 0;
    let waktuSisa = 0;
    let timer = null;
    let isLatihan = true;

    window.onload = () => { 
      initDropdowns(); 
      cekParameterURL();
    };

    // FUNGSI BARU: Membaca pesan dari Link URL
    function cekParameterURL() {
      const urlParams = new URLSearchParams(window.location.search);
      const paramMapel = urlParams.get('mapel');
      const paramBab = urlParams.get('bab');

      if(paramMapel && paramBab) {
        const selectMapel = document.getElementById('selectMapel');
        const mapelOptions = Array.from(selectMapel.options);
        // Cek nama mapel
        const matchMapel = mapelOptions.find(opt => opt.value.toLowerCase() === paramMapel.toLowerCase());
        
        if(matchMapel) {
          selectMapel.value = matchMapel.value;
          updateDropdownBab();
          
          const selectBab = document.getElementById('selectBab');
          const babOptions = Array.from(selectBab.options);
          // Gunakan includes agar "Bab 1" bisa nyambung dengan "Bab 1: Rukun Islam"
          const matchBab = babOptions.find(opt => opt.value.toLowerCase().includes(paramBab.toLowerCase()));
          
          if(matchBab) {
            selectBab.value = matchBab.value;
            
            // Sembunyikan form pilih materi agar rapi
            document.getElementById('cardPilihMateri').style.display = 'none';
            
            // Tambahkan banner info materi terpilih
            const infoDiv = document.createElement('div');
            infoDiv.style.cssText = "background: #bfdbfe; border: 4px solid #000; border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; text-align: center; box-shadow: 4px 4px 0 #000;";
            infoDiv.innerHTML = `<i class="fas fa-check-circle" style="color: #2563eb; font-size: 1.5rem; margin-bottom: 5px;"></i><br><span style="font-size: 0.8rem; font-weight: 700; text-transform: uppercase; color: #475569;">Materi Terpilih:</span><br><span style="color:#1d4ed8; font-size:1.2rem; font-weight: 900;">${matchMapel.value}<br>${matchBab.value}</span>`;
            
            document.getElementById('setupScreen').insertBefore(infoDiv, document.getElementById('cardPilihMateri'));
          }
        }
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.innerText = msg; t.style.display = 'block';
      setTimeout(() => { t.style.display = 'none'; }, 3000);
    }

    function toggleBebas() {
      const bebasInput = document.getElementById('inputBebas');
      if(document.getElementById('j_bebas').checked) {
        bebasInput.classList.remove('hidden'); bebasInput.focus();
      } else {
        bebasInput.classList.add('hidden');
      }
    }

    function initDropdowns() {
      const selectMapel = document.getElementById('selectMapel');
      const mapelSet = [...new Set(BANK_SOAL.map(item => item.mapel))];
      
      selectMapel.innerHTML = '<option value="">-- Pilih Mata Pelajaran --</option>';
      mapelSet.forEach(m => {
        selectMapel.innerHTML += `<option value="${m}">${m}</option>`;
      });
    }

    function updateDropdownBab() {
      const mapelTerpilih = document.getElementById('selectMapel').value;
      const selectBab = document.getElementById('selectBab');
      selectBab.innerHTML = '<option value="">-- Pilih Bab --</option>';
      
      if(!mapelTerpilih) return;
      
      const babSet = [...new Set(BANK_SOAL.filter(i => i.mapel === mapelTerpilih).map(i => i.bab))];
      babSet.forEach(b => {
        selectBab.innerHTML += `<option value="${b}">${b}</option>`;
      });
    }

    function mulaiMain() {
      const mapel = document.getElementById('selectMapel').value;
      const bab = document.getElementById('selectBab').value;
      
      if(!mapel || !bab) return showToast("Pilih Mata Pelajaran dan Bab terlebih dahulu!");

      // Filter soal berdasarkan pilihan
      let soalTersedia = BANK_SOAL.filter(i => i.mapel === mapel && i.bab === bab);
      
      if(soalTersedia.length === 0) return showToast("Belum ada soal untuk Bab ini.");

      // Ambil jumlah soal yang diminta
      let jmlMinta = 5;
      if(document.getElementById('j_bebas').checked) {
        jmlMinta = parseInt(document.getElementById('inputBebas').value) || 5;
      } else {
        jmlMinta = parseInt(document.querySelector('input[name="jumlah"]:checked').value);
      }

      if(jmlMinta > soalTersedia.length) {
        showToast(`Hanya tersedia ${soalTersedia.length} soal. Menampilkan semua.`);
        jmlMinta = soalTersedia.length;
      }

      isLatihan = document.getElementById('m_latihan').checked;
      
      // Acak urutan soal
      sesiSoal = [...soalTersedia].sort(() => 0.5 - Math.random()).slice(0, jmlMinta);
      
      indexSoal = 0; skor = 0;
      
      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('playScreen').style.display = 'flex';
      document.getElementById('hudTotal').innerText = sesiSoal.length;
      
      const timerBox = document.getElementById('timerContainer');
      if(isLatihan) { 
        timerBox.style.display = 'none'; 
      } else { 
        timerBox.style.display = 'block'; 
        waktuSisa = sesiSoal.length * 30; // 30 detik per soal
        mulaiWaktu(); 
      }

      renderSoal();
    }

    function mulaiWaktu() {
      clearInterval(timer);
      updateWaktuUI();
      timer = setInterval(() => {
        waktuSisa--; updateWaktuUI();
        if(waktuSisa <= 0) { clearInterval(timer); akhiriPermainan(); }
      }, 1000);
    }

    function updateWaktuUI() {
      const m = Math.floor(waktuSisa / 60).toString().padStart(2, '0');
      const s = (waktuSisa % 60).toString().padStart(2, '0');
      document.getElementById('timerContainer').innerText = `${m}:${s}`;
    }

    function renderSoal() {
      const s = sesiSoal[indexSoal];
      document.getElementById('hudNomor').innerText = indexSoal + 1;
      document.getElementById('teksSoal').innerText = s.soal;
      
      const area = document.getElementById('areaOpsi');
      area.innerHTML = '';
      
      const fbox = document.getElementById('kotakUmpanBalik');
      fbox.style.display = 'none';
      document.getElementById('btnLanjut').classList.add('hidden');

      // Acak posisi opsi jawaban
      const opsiAcak = [...s.opsi].sort(() => 0.5 - Math.random());
      
      // Deteksi jika tulisan adalah bahasa Arab (untuk styling huruf pilihan A,B,C,D)
      const isArab = /[\u0600-\u06FF]/.test(s.opsi[0]);
      
      opsiAcak.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = 'opt-btn';
        // Prefix A, B, C, D
        const abjad = isArab ? ['أ', 'ب', 'ج', 'د'][i] : ['A', 'B', 'C', 'D'][i];
        
        btn.innerHTML = `<span>${abjad}.</span> <span style="flex:1; text-align:${isArab ? 'right' : 'left'}">${opt}</span>`;
        btn.onclick = () => cekJawaban(opt, btn);
        area.appendChild(btn);
      });
    }

    function cekJawaban(jawabanUser, el) {
      const s = sesiSoal[indexSoal];
      const benar = (jawabanUser === s.jawaban);
      
      const semuaBtn = document.querySelectorAll('.opt-btn');
      semuaBtn.forEach(b => b.disabled = true); 

      if(isLatihan) {
        semuaBtn.forEach(b => {
          // Cek teks di dalam span kedua (isi opsi)
          if(b.children[1].innerText === s.jawaban) b.classList.add('correct');
        });
        if(!benar) el.classList.add('wrong');

        const fbox = document.getElementById('kotakUmpanBalik');
        fbox.style.display = 'block';
        if(benar) {
          skor++;
          fbox.style.backgroundColor = '#dcfce7'; fbox.style.borderColor = '#16a34a'; fbox.style.color = '#166534';
          fbox.innerHTML = '<i class="fas fa-check-circle"></i> MUMTAZ! TEPAT SEKALI!';
        } else {
          fbox.style.backgroundColor = '#fee2e2'; fbox.style.borderColor = '#dc2626'; fbox.style.color = '#991b1b';
          fbox.innerHTML = `SALAH. Jawaban yang benar:<br><br><span style="font-size:1.5rem; color:#000;">${s.jawaban}</span>`;
        }
        document.getElementById('btnLanjut').classList.remove('hidden');
      } else {
        if(benar) skor++;
        soalSelanjutnya();
      }
    }

    function soalSelanjutnya() {
      indexSoal++;
      if(indexSoal < sesiSoal.length) { renderSoal(); } 
      else { akhiriPermainan(); }
    }

    function akhiriPermainan() {
      clearInterval(timer);
      document.getElementById('playScreen').style.display = 'none';
      document.getElementById('resultScreen').style.display = 'flex';
      
      const persen = Math.round((skor / sesiSoal.length) * 100);
      document.getElementById('skorAkhir').innerText = persen;
      document.getElementById('benarAkhir').innerText = skor;
      document.getElementById('totalAkhir').innerText = sesiSoal.length;
    }

    function kembaliKeMenu() {
      document.getElementById('resultScreen').style.display = 'none';
      document.getElementById('playScreen').style.display = 'none';
      document.getElementById('setupScreen').style.display = 'block';
      clearInterval(timer);
    }
  </script>
</body>
</html>
