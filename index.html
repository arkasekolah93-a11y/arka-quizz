<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  <title>Kuis Arka Belajar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600&family=Press+Start+2P&display=swap" rel="stylesheet">
  
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Fredoka', sans-serif; 
      background-color: #fde047; 
      background-image: radial-gradient(#000 1px, transparent 1px);
      background-size: 20px 20px;
      color: #000; 
      min-height: 100vh; 
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
    }
    
    .card {
      background: #fff;
      border: 5px solid #000;
      border-radius: 16px;
      box-shadow: 8px 8px 0 #000;
      width: 100%;
      max-width: 600px;
      padding: 2rem;
      margin-top: 1rem;
      position: relative;
    }

    h1, h2 { font-family: 'Press Start 2P', cursive; text-align: center; line-height: 1.5; }
    h1 { font-size: 1.2rem; color: #ef4444; text-shadow: 2px 2px 0 #000; margin-bottom: 1.5rem; }
    h2 { font-size: 1rem; margin-bottom: 1rem; }

    label { font-weight: 600; display: block; margin-top: 1rem; margin-bottom: 0.5rem; font-size: 1.1rem; }
    select, input[type="number"], input[type="text"] {
      width: 100%;
      padding: 12px;
      border: 3px solid #000;
      border-radius: 8px;
      font-family: 'Fredoka', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      background: #e2e8f0;
      box-shadow: 4px 4px 0 #000;
      outline: none;
    }

    .btn {
      width: 100%;
      padding: 15px;
      margin-top: 2rem;
      border: 4px solid #000;
      border-radius: 12px;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.9rem;
      cursor: pointer;
      box-shadow: 6px 6px 0 #000;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .btn:active { transform: translate(6px, 6px); box-shadow: 0 0 0 #000; }
    .btn-primary { background: #4ade80; color: #000; }
    .btn-danger { background: #ef4444; color: #fff; margin-top: 1rem;}
    .btn-option {
      background: #93c5fd; font-family: 'Fredoka', sans-serif; font-size: 1.2rem; font-weight: 600;
      margin-top: 10px; text-align: left;
    }

    .info-banner {
      background: #3b82f6; color: white; padding: 10px; border: 3px solid #000; 
      border-radius: 8px; font-weight: bold; text-align: center; margin-bottom: 1.5rem;
      box-shadow: 4px 4px 0 #000;
    }
    
    .hidden { display: none !important; }
    .arabic-text { direction: rtl; font-size: 1.8rem; line-height: 2.5; }
    
    .hud { display: flex; justify-content: space-between; font-family: 'Press Start 2P', cursive; font-size: 0.7rem; margin-bottom: 1rem; background: #000; color: #fff; padding: 10px; border-radius: 8px; }
    .timer.danger { color: #ef4444; animation: blink 1s infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    #loadingScreen i { font-size: 3rem; color: #3b82f6; margin-bottom: 1rem; }
    
    .media-box {
        margin-bottom: 1.5rem;
        text-align: center;
    }
    .media-box img, .media-box iframe {
        max-width: 100%;
        max-height: 250px;
        border-radius: 8px;
        border: 4px solid #000;
        box-shadow: 4px 4px 0 #000;
    }
  </style>
</head>
<body>

  <!-- Layar Loading Data -->
  <div id="loadingScreen" class="card" style="text-align: center; padding: 4rem 2rem;">
    <i class="fas fa-spinner fa-spin"></i>
    <h2>MEMUAT BANK SOAL...</h2>
    <p>Menghubungkan ke Google Sheets</p>
  </div>

  <!-- Layar Pengaturan Kuis -->
  <div id="setupScreen" class="card hidden">
    <h1>ARENA KUIS</h1>
    
    <div id="bannerInfo" class="info-banner hidden"></div>

    <label>Mode Bermain:</label>
    <select id="setMode">
      <option value="latihan">🎓 Latihan (Tanpa Waktu)</option>
      <option value="kuis">⏱️ Kuis Cepat (Ada Waktu)</option>
    </select>

    <label>Jenis Soal:</label>
    <select id="setTipe">
      <option value="semua">Campuran (Ganda & Uraian)</option>
      <option value="ganda">Pilihan Ganda Saja</option>
      <option value="uraian">Uraian / Isian Saja</option>
    </select>

    <label>Jumlah Soal:</label>
    <select id="setJumlah" onchange="toggleCustomJumlah()">
      <option value="5">5 Soal</option>
      <option value="10">10 Soal</option>
      <option value="15">15 Soal</option>
      <option value="bebas">Bebas (Ketik Sendiri)</option>
    </select>
    <input type="number" id="customJumlah" class="hidden" placeholder="Masukkan angka..." style="margin-top:10px;" min="1">

    <button class="btn btn-primary" onclick="mulaiKuis()">MULAI MISI <i class="fas fa-rocket"></i></button>
  </div>

  <!-- Layar Utama Bermain -->
  <div id="playScreen" class="card hidden">
    <div class="hud">
      <div>SOAL: <span id="soalKe">1</span>/<span id="soalTotal">10</span></div>
      <div id="waktuBox" class="hidden">WAKTU: <span id="waktuSisa">0</span>s</div>
    </div>
    
    <div id="tempatMedia" class="media-box hidden"></div>
    
    <h2 id="teksSoal" style="text-align: left; font-family: 'Fredoka'; font-size: 1.5rem; margin-bottom: 1.5rem;">Pertanyaan...</h2>
    
    <div id="tempatOpsi"></div>
    
    <div id="tempatUraian" class="hidden">
      <input type="text" id="inputUraian" placeholder="Ketik jawabanmu di sini...">
      <button class="btn btn-primary" onclick="cekUraian()" style="margin-top: 10px;">KUNCI JAWABAN <i class="fas fa-check"></i></button>
    </div>

    <div id="feedback" class="info-banner hidden" style="margin-top: 1rem;"></div>
    <button id="btnLanjut" class="btn btn-primary hidden" onclick="soalSelanjutnya()">LANJUT <i class="fas fa-arrow-right"></i></button>
  </div>

  <!-- Layar Hasil -->
  <div id="resultScreen" class="card hidden" style="text-align: center;">
    <h1>MISI SELESAI!</h1>
    <h2 style="font-size: 3rem; margin: 1.5rem 0;" id="skorAkhir">100</h2>
    <p style="font-weight: bold; font-size: 1.2rem; margin-bottom: 2rem;">Benar: <span id="benarAkhir">0</span> | Salah: <span id="salahAkhir">0</span></p>
    <button class="btn btn-primary" onclick="location.reload()">MAIN LAGI <i class="fas fa-redo"></i></button>
  </div>

  <script>
    // MASUKKAN LINK GOOGLE APPS SCRIPT KUIS BAPAK DI SINI:
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxOeIJAjNpZ4Qf0uYom7l0fvSNh25D4jHLMjG3-9-DZjmcBLcf_Ie1Ps__XkithIHP4/exec"; 

    let BANK_SOAL_GLOBAL = [];
    let soalTersaring = [];
    let indexSoal = 0;
    let skorBenar = 0;
    let skorSalah = 0;
    let waktuTimer;
    let sisaWaktu = 0;

    let targetKelas = "";
    let targetMapel = "";
    let targetBab = "";

    window.onload = async function() {
      const urlParams = new URLSearchParams(window.location.search);
      targetKelas = urlParams.get('kelas') || "";
      targetMapel = urlParams.get('mapel') || "";
      targetBab = urlParams.get('bab') || "";

      await tarikDataDariSheets();
    };

    async function tarikDataDariSheets() {
      try {
        const response = await fetch(GAS_URL);
        const json = await response.json();
        
        if(json.status === "success") {
          BANK_SOAL_GLOBAL = json.data;
          siapkanMenu();
        } else {
          alert("Gagal membaca Sheets: " + json.message);
        }
      } catch (e) {
        alert("Gagal koneksi ke Google Sheets. Periksa link GAS.");
      }
    }

    function siapkanMenu() {
      document.getElementById('loadingScreen').classList.add('hidden');
      document.getElementById('setupScreen').classList.remove('hidden');

      if(targetMapel && targetBab) {
        const banner = document.getElementById('bannerInfo');
        let infoTeks = `<i class="fas fa-book"></i> Materi Terpilih:<br>`;
        if(targetKelas) infoTeks += `Kelas ${targetKelas} - `;
        infoTeks += `${targetMapel.toUpperCase()} - ${targetBab.toUpperCase()}`;
        
        banner.innerHTML = infoTeks;
        banner.classList.remove('hidden');
      }
    }

    function toggleCustomJumlah() {
      const val = document.getElementById('setJumlah').value;
      if(val === 'bebas') {
        document.getElementById('customJumlah').classList.remove('hidden');
      } else {
        document.getElementById('customJumlah').classList.add('hidden');
      }
    }

    // FUNGSI PEMBERSIH TEKS SUPER (MENGHAPUS SPASI & SIMBOL UNTUK PENCOCOKAN)
    function bersihkanTeks(teks) {
      if(!teks) return "";
      // Ubah ke huruf kecil dan hapus semua spasi serta karakter non-alfanumerik
      return teks.toString().toLowerCase().replace(/[^a-z0-9]/g, '');
    }

    function mulaiKuis() {
      const mode = document.getElementById('setMode').value;
      const tipe = document.getElementById('setTipe').value;
      let jumlahMinta = document.getElementById('setJumlah').value;
      
      if(jumlahMinta === 'bebas') {
        jumlahMinta = parseInt(document.getElementById('customJumlah').value) || 5;
      } else {
        jumlahMinta = parseInt(jumlahMinta);
      }

      // 1. SARING SOAL (ANTI TYPO & SUPER PINTAR)
      soalTersaring = BANK_SOAL_GLOBAL.filter(s => {
        let k1 = bersihkanTeks(s.kelas);
        let k2 = bersihkanTeks(targetKelas);
        let cocokKelas = targetKelas ? (k1 === k2 || k1.includes(k2)) : true;
        
        let m1 = bersihkanTeks(s.mapel);
        let m2 = bersihkanTeks(targetMapel);
        let cocokMapel = targetMapel ? (m1 === m2) : true;
        
        // --- KODE BARU: Pencocokan Bab Ekstrak Angka ---
        // Mencari angka di dalam teks (Misal: "Bab 1-2" jadi ['1', '2'])
        let angkaBabSoal = s.bab.toString().match(/\d+/g) || [];
        let angkaBabTarget = targetBab.toString().match(/\d+/g) || [];
        
        let cocokBab = true;
        if (targetBab) {
            if (angkaBabSoal.length > 0 && angkaBabTarget.length > 0) {
                // Jika dari aplikasi minta "Bab 1-2", dan di excel ada "1", maka cocok!
                cocokBab = angkaBabSoal.some(angka => angkaBabTarget.includes(angka));
            } else {
                // Jika bab tidak pakai angka sama sekali (Misal: "Ujian Akhir")
                let b1 = bersihkanTeks(s.bab).replace(/bab/g, '');
                let b2 = bersihkanTeks(targetBab).replace(/bab/g, '');
                cocokBab = (b1 === b2 || b2.includes(b1) || b1.includes(b2));
            }
        }
        // --- AKHIR KODE BARU ---
        
        let cocokTipe = (tipe === 'semua') ? true : (s.tipe === tipe);
        
        return cocokKelas && cocokMapel && cocokBab && cocokTipe;
      });

      if(soalTersaring.length === 0) {
        // Tampilkan peringatan beserta contoh data pertama di sheets agar mudah di-debug
        let infoDebug = BANK_SOAL_GLOBAL.length > 0 
          ? `\n\nBOCORAN DATA DI GOOGLE SHEETS BAPAK:\nNama Tab (Mapel): ${BANK_SOAL_GLOBAL[0].mapel}\nNama Bab: ${BANK_SOAL_GLOBAL[0].bab}`
          : "\n\nDatabase di Google Sheets Bapak kosong atau gagal terbaca.";
        
        alert("Waduh! Soal untuk materi ini belum ada." + infoDebug);
        return;
      }

      soalTersaring.sort(() => Math.random() - 0.5);

      if(jumlahMinta > soalTersaring.length) {
        alert(`Jumlah soal yang diminta (${jumlahMinta}) terlalu banyak. Bank Soal hanya punya ${soalTersaring.length} soal. Kita pakai semuanya ya!`);
        jumlahMinta = soalTersaring.length;
      }
      soalTersaring = soalTersaring.slice(0, jumlahMinta);

      document.getElementById('setupScreen').classList.add('hidden');
      document.getElementById('playScreen').classList.remove('hidden');
      document.getElementById('soalTotal').innerText = soalTersaring.length;
      
      if(mode === 'kuis') { document.getElementById('waktuBox').classList.remove('hidden'); }

      tampilkanSoal();
    }

    function tampilkanSoal() {
      clearInterval(waktuTimer);
      const soalKini = soalTersaring[indexSoal];
      const mode = document.getElementById('setMode').value;
      
      document.getElementById('soalKe').innerText = indexSoal + 1;
      
      const tempatMedia = document.getElementById('tempatMedia');
      tempatMedia.innerHTML = "";
      tempatMedia.classList.add('hidden');
      if (soalKini.media) {
          tempatMedia.classList.remove('hidden');
          if(soalKini.media.includes('youtube.com') || soalKini.media.includes('youtu.be')) {
              let ytId = soalKini.media.split('v=')[1] || soalKini.media.split('youtu.be/')[1];
              if(ytId) ytId = ytId.split('&')[0];
              tempatMedia.innerHTML = `<iframe width="100%" height="200" src="https://www.youtube.com/embed/${ytId}" frameborder="0" allowfullscreen></iframe>`;
          } else {
              tempatMedia.innerHTML = `<img src="${soalKini.media}" alt="Media">`;
          }
      }

      let teksElement = document.getElementById('teksSoal');
      teksElement.innerText = soalKini.soal;
      if(/[\u0600-\u06FF]/.test(soalKini.soal)) { teksElement.classList.add('arabic-text'); } 
      else { teksElement.classList.remove('arabic-text'); }

      document.getElementById('feedback').classList.add('hidden');
      document.getElementById('btnLanjut').classList.add('hidden');
      
      const tempatOpsi = document.getElementById('tempatOpsi');
      const tempatUraian = document.getElementById('tempatUraian');
      tempatOpsi.innerHTML = "";
      document.getElementById('inputUraian').value = "";

      if(soalKini.tipe === 'ganda') {
        tempatUraian.classList.add('hidden');
        tempatOpsi.classList.remove('hidden');
        
        let opsiAcak = [...soalKini.opsi].sort(() => Math.random() - 0.5);
        opsiAcak.forEach(opsi => {
          let btn = document.createElement('button');
          btn.className = 'btn btn-option';
          btn.innerText = opsi;
          if(/[\u0600-\u06FF]/.test(opsi)) { btn.classList.add('arabic-text'); }
          btn.onclick = () => cekJawaban(btn, opsi, soalKini.jawaban);
          tempatOpsi.appendChild(btn);
        });
      } else {
        tempatOpsi.classList.add('hidden');
        tempatUraian.classList.remove('hidden');
      }

      if(mode === 'kuis') { jalankanWaktu(30); }
    }

    function jalankanWaktu(detik) {
      sisaWaktu = detik;
      const display = document.getElementById('waktuSisa');
      const box = document.getElementById('waktuBox');
      display.innerText = sisaWaktu;
      box.classList.remove('danger');
      
      waktuTimer = setInterval(() => {
        sisaWaktu--;
        display.innerText = sisaWaktu;
        if(sisaWaktu <= 5) { box.classList.add('danger'); }
        if(sisaWaktu <= 0) {
          clearInterval(waktuTimer);
          prosesSalahWaktuHabis();
        }
      }, 1000);
    }

    function cekJawaban(btnKlik, opsiDipilih, kunci) {
      clearInterval(waktuTimer);
      let semuaBtn = document.querySelectorAll('.btn-option');
      semuaBtn.forEach(b => b.disabled = true);

      let benar = opsiDipilih.toString().toLowerCase().trim() === kunci.toString().toLowerCase().trim();
      tampilkanFeedback(benar, kunci);
      if(benar) { btnKlik.style.background = "#4ade80"; skorBenar++; } 
      else { btnKlik.style.background = "#ef4444"; btnKlik.style.color = "#fff"; skorSalah++; }
    }

    function cekUraian() {
      clearInterval(waktuTimer);
      let isi = document.getElementById('inputUraian').value;
      if(!isi) return;
      document.getElementById('inputUraian').disabled = true;
      let kunci = soalTersaring[indexSoal].jawaban;
      
      let benar = isi.toString().toLowerCase().trim() === kunci.toString().toLowerCase().trim();
      tampilkanFeedback(benar, kunci);
      if(benar) { skorBenar++; } else { skorSalah++; }
    }

    function prosesSalahWaktuHabis() {
      let semuaBtn = document.querySelectorAll('.btn-option');
      semuaBtn.forEach(b => b.disabled = true);
      document.getElementById('inputUraian').disabled = true;
      skorSalah++;
      tampilkanFeedback(false, soalTersaring[indexSoal].jawaban, true);
    }

    function tampilkanFeedback(benar, kunci, waktuHabis = false) {
      let fb = document.getElementById('feedback');
      fb.classList.remove('hidden');
      if(benar) {
        fb.style.background = "#4ade80"; fb.style.color = "#000";
        fb.innerHTML = "✅ TEPAT SEKALI!";
      } else {
        fb.style.background = "#ef4444"; fb.style.color = "#fff";
        fb.innerHTML = (waktuHabis ? "⏱️ WAKTU HABIS!<br>" : "❌ KURANG TEPAT!<br>") + "Jawaban: " + kunci;
      }
      document.getElementById('btnLanjut').classList.remove('hidden');
    }

    function soalSelanjutnya() {
      indexSoal++;
      if(indexSoal < soalTersaring.length) {
        document.getElementById('inputUraian').disabled = false;
        tampilkanSoal();
      } else {
        document.getElementById('playScreen').classList.add('hidden');
        document.getElementById('resultScreen').classList.remove('hidden');
        
        let nilaiAkhir = Math.round((skorBenar / soalTersaring.length) * 100);
        document.getElementById('skorAkhir').innerText = nilaiAkhir;
        document.getElementById('benarAkhir').innerText = skorBenar;
        document.getElementById('salahAkhir').innerText = skorSalah;
      }
    }
  </script>
</body>
</html>
