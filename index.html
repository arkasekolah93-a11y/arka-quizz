<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ARKA QUIZZ</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Tone.js untuk Efek Suara Digital -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Fredoka:wght@400;600;700&display=swap');

    :root {
      --primary: #3b82f6; --secondary: #fde047; --danger: #ef4444; 
      --success: #22c55e; --dark: #1e293b; --light: #f8fafc;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Fredoka', sans-serif;
      background-color: #8b5cf6;
      background-image: 
        radial-gradient(circle at 25px 25px, rgba(255, 255, 255, 0.2) 2%, transparent 0%),
        radial-gradient(circle at 75px 75px, rgba(255, 255, 255, 0.2) 2%, transparent 0%);
      background-size: 100px 100px;
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      overflow-x: hidden;
      /* Mencegah highlight biru saat di-tap di HP */
      -webkit-tap-highlight-color: transparent; 
    }

    .pixel-font { font-family: 'Press Start 2P', cursive; }

    .brutal-box {
      background-color: white;
      border: 4px solid var(--dark);
      border-radius: 12px;
      box-shadow: 6px 6px 0px var(--dark);
      padding: 1.5rem;
      width: 100%;
      max-width: 500px;
      margin-bottom: 1.5rem;
      transition: all 0.1s ease;
    }

    .brutal-btn {
      display: block;
      width: 100%;
      padding: 1rem;
      font-size: 1rem;
      font-weight: 700;
      text-align: center;
      background-color: var(--primary);
      color: white;
      border: 4px solid var(--dark);
      border-radius: 8px;
      box-shadow: 4px 4px 0px var(--dark);
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s;
      margin-bottom: 1rem;
    }

    .brutal-btn:active { transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--dark); }
    .brutal-btn.secondary { background-color: var(--secondary); color: var(--dark); }
    .brutal-btn.danger { background-color: var(--danger); }
    .brutal-btn.success { background-color: var(--success); }
    .brutal-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: translate(4px, 4px); box-shadow: 0px 0px 0px var(--dark); }

    .brutal-input {
      width: 100%;
      padding: 0.75rem;
      border: 3px solid var(--dark);
      border-radius: 8px;
      font-family: 'Fredoka', sans-serif;
      font-size: 1.2rem;
      font-weight: 600;
      margin-bottom: 1rem;
      box-shadow: inset 3px 3px 0px rgba(0,0,0,0.1);
      text-align: center;
    }

    /* Agar input readonly tidak terlihat abu-abu */
    .brutal-input[readonly] {
      background-color: white;
      cursor: text;
    }
    
    .opsi-grid { display: grid; grid-template-columns: 1fr; gap: 10px; }
    @media (min-width: 600px) { .opsi-grid { grid-template-columns: 1fr 1fr; } }
    
    .hud { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 1rem; border-bottom: 4px solid var(--dark); padding-bottom: 0.5rem; }
    .timer { font-size: 1.5rem; color: var(--danger); text-shadow: 2px 2px 0 #fff; }
    
    .hidden { display: none !important; }

    /* Arab styling */
    .teks-arab { direction: rtl; text-align: right; font-size: 1.5rem; line-height: 2.2; font-family: 'Amiri', 'Scheherazade New', serif; }
    
    .media-container { width: 100%; max-height: 250px; overflow: hidden; border: 3px solid #000; border-radius: 8px; margin-bottom: 1rem; display: flex; justify-content: center; align-items: center; background: #e2e8f0; }
    .media-container img { max-width: 100%; max-height: 250px; object-fit: contain; }
    .media-container iframe { width: 100%; height: 250px; border: none; }

    /* Tombol Mute */
    #btnMute {
      position: fixed;
      top: 15px;
      right: 15px;
      background: var(--secondary);
      border: 3px solid var(--dark);
      border-radius: 50%;
      width: 45px;
      height: 45px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2rem;
      cursor: pointer;
      box-shadow: 3px 3px 0px var(--dark);
      z-index: 100;
      transition: all 0.1s;
    }
    #btnMute:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px var(--dark); }

    /* VIRTUAL KEYBOARD STYLING */
    #virtualKeyboard {
      background-color: #cbd5e1;
      padding: 0.5rem;
      border-radius: 8px;
      border: 3px solid var(--dark);
      margin-bottom: 1rem;
    }
    .vk-row {
      display: flex;
      justify-content: center;
      gap: 4px;
      margin-bottom: 4px;
    }
    .vk-key {
      background-color: white;
      border: 2px solid var(--dark);
      border-radius: 6px;
      padding: 0.5rem 0;
      font-family: 'Fredoka', sans-serif;
      font-weight: bold;
      font-size: 1.1rem;
      flex-grow: 1;
      text-align: center;
      cursor: pointer;
      box-shadow: 2px 2px 0px var(--dark);
      user-select: none;
      min-width: 30px;
    }
    .vk-key:active {
      transform: translate(2px, 2px);
      box-shadow: 0px 0px 0px var(--dark);
      background-color: #e2e8f0;
    }
    .vk-key-wide { flex-grow: 3; background-color: var(--secondary); }
    .vk-key-danger { background-color: #fca5a5; }
    .vk-arab-font { font-family: 'Amiri', 'Scheherazade New', serif; font-size: 1.3rem; }

  </style>
</head>
<body>

  <!-- Tombol Audio Mute/Unmute -->
  <button id="btnMute" onclick="toggleAudio()" title="Matikan/Hidupkan Suara">
    <i class="fas fa-volume-up"></i>
  </button>

  <h1 class="pixel-font text-white text-xl md:text-2xl mb-6 mt-4 text-center" style="text-shadow: 3px 3px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;">
    ARKA QUIZZ
  </h1>

  <div id="screenLoading" class="brutal-box text-center">
    <i class="fas fa-rocket fa-bounce text-5xl text-blue-500 mb-4"></i>
    <h2 class="pixel-font text-sm mb-2" id="loadingText">MENYIAPKAN ARENA BERMAIN...</h2>
    <p class="text-sm text-gray-600" id="loadingSub">Mengambil senjata dan misi rahasia...</p>
  </div>

  <div id="screenSetup" class="brutal-box hidden">
    <div id="infoMapelBab" class="bg-blue-800 text-white p-3 rounded-lg border-2 border-black font-bold text-center mb-4 pixel-font text-[10px] md:text-xs tracking-wider">
      MENUNGGU MATERI...
    </div>

    <label class="font-bold mb-1 block">Mode Bermain:</label>
    <select id="setMode" class="brutal-input" style="text-align: left;" onchange="togglePengaturanWaktu()">
      <option value="santai">🎓 Latihan (Tanpa Waktu)</option>
      <option value="cepat">⚡ Kuis Cepat (Batas Waktu)</option>
    </select>

    <div id="wadahWaktu" class="hidden">
      <label class="font-bold mb-1 block text-red-600">Batas Waktu per Soal:</label>
      <select id="setDurasi" class="brutal-input border-red-500" style="text-align: left;" onchange="toggleWaktuBebas()">
        <option value="5">5 Detik</option>
        <option value="10" selected>10 Detik</option>
        <option value="15">15 Detik</option>
        <option value="20">20 Detik</option>
        <option value="30">30 Detik</option>
        <option value="60">60 Detik</option>
        <option value="bebas">Bebas (Ketik Sendiri)</option>
      </select>
      <input type="number" id="inputWaktuBebas" class="brutal-input hidden border-red-500" style="text-align: left;" placeholder="Ketik detik (misal: 45)" min="1">
    </div>

    <label class="font-bold mb-1 block mt-2">Jenis Soal:</label>
    <select id="setJenis" class="brutal-input" style="text-align: left;">
      <option value="semua">Campuran (Ganda & Uraian)</option>
      <option value="ganda">Hanya Pilihan Ganda</option>
      <option value="uraian">Hanya Uraian</option>
    </select>

    <label class="font-bold mb-1 block">Jumlah Soal:</label>
    <select id="setJumlah" class="brutal-input" style="text-align: left;" onchange="toggleJumlahBebas()">
      <option value="5">5 Soal</option>
      <option value="10">10 Soal</option>
      <option value="semua">Semua Soal Tersedia</option>
      <option value="bebas">Bebas (Ketik Sendiri)</option>
    </select>
    <input type="number" id="inputJumlahBebas" class="brutal-input hidden" style="text-align: left;" placeholder="Masukkan jumlah..." min="1">

    <button id="btnMulaiKuis" class="brutal-btn success mt-4 pixel-font text-sm" onclick="mulaiKuis()">MULAI MISI 🚀</button>
  </div>

  <div id="screenPlay" class="brutal-box hidden">
    <div class="hud">
      <div id="infoSoal">Soal: 1/10</div>
      <div id="infoSkor">Skor: 0</div>
    </div>
    
    <div id="waktuContainer" class="text-center mb-4 hidden">
      <span class="pixel-font timer" id="timerAngka">10</span>
    </div>

    <div id="tempatMedia" class="media-container hidden"></div>

    <div id="teksSoal" class="text-lg font-bold mb-6">Pertanyaan muncul di sini?</div>
    
    <div id="areaGanda" class="opsi-grid hidden"></div>

    <div id="areaUraian" class="hidden">
      <!-- Input dibuat readonly agar keyboard HP tidak muncul -->
      <input type="text" id="inputUraian" class="brutal-input" dir="auto" placeholder="Ketuk tombol di bawah..." readonly>
      
      <!-- Wadah Virtual Keyboard -->
      <div id="virtualKeyboard"></div>

      <button class="brutal-btn primary" onclick="cekJawabanUraian()">JAWAB</button>
    </div>

    <!-- Kotak Notifikasi In-Frame -->
    <div id="wadahNotif" class="hidden mt-4 p-4 rounded-xl border-4 border-black font-bold text-center">
      <h3 id="judulNotif" class="text-2xl mb-2 pixel-font">BENAR!</h3>
      <p id="pesanNotif" class="mb-4 text-lg">Kamu dapat 10 poin.</p>
      <button id="btnLanjut" class="brutal-btn success pixel-font text-sm" onclick="lanjutSoal()">LANJUTKAN >></button>
    </div>
  </div>

  <div id="screenResult" class="brutal-box hidden text-center">
    <i class="fas fa-trophy text-6xl text-yellow-400 mb-4" style="-webkit-text-stroke: 2px black;"></i>
    <h2 class="pixel-font mb-4">MISI SELESAI!</h2>
    <div class="text-2xl font-bold mb-2">Nilai Akhir: <span id="nilaiAkhir" class="text-green-600 text-4xl">100</span></div>
    <div id="pesanHasil" class="mb-6 text-gray-700 font-semibold">Luar Biasa!</div>
    <button class="brutal-btn primary pixel-font text-sm" onclick="location.reload()">MAIN LAGI</button>
  </div>

  <script>
    // --- KONFIGURASI LINK SPREADSHEET GAS BAPAK ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxOeIJAjNpZ4Qf0uYom7l0fvSNh25D4jHLMjG3-9-DZjmcBLcf_Ie1Ps__XkithIHP4/exec";
    
    let dbSoal = [];
    let soalAktif = [];
    let indeksSoal = 0;
    let skor = 0;
    
    let waktuTimer;
    let waktuBerjalan;
    let durasiPerSoal = 10;

    // --- KONFIGURASI VIRTUAL KEYBOARD ---
    // Simbol ◌ (U+25CC) digunakan sebagai dudukan harakat
    const VK_LAYOUTS = {
      latin: [
        ['1','2','3','4','5','6','7','8','9','0'],
        ['q','w','e','r','t','y','u','i','o','p'],
        ['a','s','d','f','g','h','j','k','l'],
        ['z','x','c','v','b','n','m'],
        ['{space}', '{backspace}']
      ],
      arab: [
        ['١','٢','٣','٤','٥','٦','٧','٨','٩','٠'],
        ['ض','ص','ث','ق','ف','غ','ع','ه','خ','ح','ج','د'],
        ['ش','س','ي','ب','ل','ا','ت','ن','م','ك','ط'],
        ['ئ','ء','ؤ','ر','ى','ة','و','ز','ظ'],
        ['\u064E','\u0650','\u064F','\u064B','\u064D','\u064C','\u0652','\u0651'], // Harakat tanpa dudukan untuk diketik
        ['{space}', '{backspace}']
      ]
    };

    // Harakat khusus untuk tampilan (dengan titik-titik lingkaran)
    const TAMPILAN_HARAKAT = {
      '\u064E': '◌َ', '\u0650': '◌ِ', '\u064F': '◌ُ', 
      '\u064B': '◌ً', '\u064D': '◌ٍ', '\u064C': '◌ٌ', 
      '\u0652': '◌ْ', '\u0651': '◌ّ'
    };

    let currentKeyboard = 'latin'; // Default

    // --- LOGIKA AUDIO (TONE.JS) ---
    let audioAktif = true;
    let bgmSeq, synthBenar, synthSalah, synthTik;

    function initAudio() {
      const bgmSynth = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "square" },
        envelope: { attack: 0.05, decay: 0.2, sustain: 0.2, release: 1 }
      }).toDestination();
      bgmSynth.volume.value = -25; 

      bgmSeq = new Tone.Sequence((time, note) => {
        bgmSynth.triggerAttackRelease(note, "8n", time);
      }, ["C4", "E4", "G4", "E4", "A4", "G4", "C5", "G4"], "4n");
      Tone.Transport.bpm.value = 130;

      synthBenar = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "triangle" },
        envelope: { attack: 0.05, decay: 0.3, sustain: 0.2, release: 1 }
      }).toDestination();
      synthBenar.volume.value = -10;

      synthSalah = new Tone.PolySynth(Tone.Synth, {
        oscillator: { type: "sawtooth" },
        envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 }
      }).toDestination();
      synthSalah.volume.value = -15;

      synthTik = new Tone.MembraneSynth().toDestination();
      synthTik.volume.value = -15;
    }

    function toggleAudio() {
      audioAktif = !audioAktif;
      const btn = document.getElementById('btnMute');
      if (audioAktif) {
        btn.innerHTML = '<i class="fas fa-volume-up"></i>';
        btn.style.backgroundColor = 'var(--secondary)';
        if(bgmSeq && document.getElementById('screenPlay').classList.contains('hidden') === false) { 
          Tone.Transport.start(); bgmSeq.start(0); 
        }
      } else {
        btn.innerHTML = '<i class="fas fa-volume-mute"></i>';
        btn.style.backgroundColor = '#ccc';
        Tone.Transport.stop();
        if(bgmSeq) bgmSeq.stop();
      }
    }

    function mainkanBGM() {
      if(!audioAktif || !bgmSeq) return;
      Tone.Transport.start();
      bgmSeq.start(0);
    }

    function stopBGM() {
      Tone.Transport.stop();
      if(bgmSeq) bgmSeq.stop();
    }

    function sfxBenar() {
      if(!audioAktif) return;
      const now = Tone.now();
      synthBenar.triggerAttackRelease("C5", "16n", now);
      synthBenar.triggerAttackRelease("E5", "16n", now + 0.1);
      synthBenar.triggerAttackRelease("G5", "8n", now + 0.2);
    }

    function sfxSalah() {
      if(!audioAktif) return;
      synthSalah.triggerAttackRelease("C3", "16n");
      setTimeout(() => synthSalah.triggerAttackRelease("A2", "8n"), 150);
    }

    function sfxTik() {
      if(!audioAktif) return;
      synthTik.triggerAttackRelease("C4", "32n");
    }

    // --- INISIALISASI & AMBIL DATA DARI GOOGLE SHEETS ---
    window.onload = function() {
      const urlParams = new URLSearchParams(window.location.search);
      let targetMapel = urlParams.get('mapel');
      let targetBab = urlParams.get('bab');
      let targetKelas = urlParams.get('kelas');
      
      if(targetMapel && targetBab) {
         document.getElementById('infoMapelBab').innerText = targetMapel.toUpperCase() + " - " + targetBab.toUpperCase();
      } else {
         document.getElementById('infoMapelBab').innerText = "LATIHAN SOAL BEBAS";
      }

      fetch(GAS_URL)
        .then(res => res.json())
        .then(res => {
           let dataSheets = res.data || [];
           
           if(targetMapel && targetBab) {
             let matchTarget = targetBab.match(/\d+/g); 
             
             dbSoal = dataSheets.filter(s => {
                let namaTabCocok = s.mapel.toLowerCase().trim() === targetMapel.toLowerCase().trim();
                let babCocok = false;
                
                let angkaSumber = s.bab.toString().match(/\d+/);
                if (angkaSumber && matchTarget) {
                  let sumberNum = parseInt(angkaSumber[0]);
                  if(matchTarget.length === 1) {
                     if (sumberNum === parseInt(matchTarget[0])) babCocok = true;
                  } else if (matchTarget.length >= 2) {
                     let awal = parseInt(matchTarget[0]);
                     let akhir = parseInt(matchTarget[1]);
                     if (sumberNum >= awal && sumberNum <= akhir) babCocok = true;
                  }
                } else {
                  if (s.bab.toLowerCase().trim() === targetBab.toLowerCase().trim()) babCocok = true;
                }
                
                let kelasCocok = true;
                if(targetKelas && s.kelas) { kelasCocok = s.kelas.toString() === targetKelas.toString(); }

                return namaTabCocok && babCocok && kelasCocok;
             });

             if(dbSoal.length === 0) {
               document.getElementById('infoMapelBab').innerText = "BANK SOAL KOSONG!";
               document.getElementById('loadingText').innerText = "Waduh! Soal belum tersedia.";
               document.getElementById('loadingSub').innerText = `Bocoran data: Kelas ${targetKelas}, Mapel ${targetMapel}, Bab ${targetBab}`;
               document.getElementById('screenLoading').querySelector('i').className = "fas fa-exclamation-triangle text-5xl text-yellow-500 mb-4";
               return; 
             }
           } else {
             dbSoal = dataSheets; 
           }

           document.getElementById('screenLoading').classList.add('hidden');
           document.getElementById('screenSetup').classList.remove('hidden');
        })
        .catch(err => {
           document.getElementById('loadingText').innerText = "GAGAL TERHUBUNG!";
           document.getElementById('loadingSub').innerText = "Pastikan ada koneksi internet.";
           document.getElementById('screenLoading').querySelector('i').className = "fas fa-wifi text-5xl text-red-500 mb-4";
        });
    };

    function toggleJumlahBebas() {
      const val = document.getElementById('setJumlah').value;
      if (val === 'bebas') document.getElementById('inputJumlahBebas').classList.remove('hidden');
      else document.getElementById('inputJumlahBebas').classList.add('hidden');
    }

    function togglePengaturanWaktu() {
      const val = document.getElementById('setMode').value;
      if (val === 'cepat') document.getElementById('wadahWaktu').classList.remove('hidden');
      else document.getElementById('wadahWaktu').classList.add('hidden');
    }

    function toggleWaktuBebas() {
      const val = document.getElementById('setDurasi').value;
      if (val === 'bebas') document.getElementById('inputWaktuBebas').classList.remove('hidden');
      else document.getElementById('inputWaktuBebas').classList.add('hidden');
    }

    // --- FUNGSI VIRTUAL KEYBOARD ---
    function renderKeyboard(jenisLayout) {
      const container = document.getElementById('virtualKeyboard');
      container.innerHTML = ''; // Bersihkan keyboard sebelumnya
      
      const layout = VK_LAYOUTS[jenisLayout];
      const isArab = jenisLayout === 'arab';

      layout.forEach(baris => {
        const rowDiv = document.createElement('div');
        rowDiv.className = 'vk-row';
        
        // Reverse array untuk baris arab agar dari kanan ke kiri
        let tombolBaris = [...baris];
        if (isArab) tombolBaris.reverse();

        tombolBaris.forEach(kunci => {
          const btn = document.createElement('button');
          btn.className = 'vk-key ' + (isArab ? 'vk-arab-font' : '');
          
          if (kunci === '{space}') {
            btn.innerHTML = 'Spasi';
            btn.classList.add('vk-key-wide');
            btn.onclick = () => ketikVK(' ');
          } else if (kunci === '{backspace}') {
            btn.innerHTML = '<i class="fas fa-backspace"></i>';
            btn.classList.add('vk-key-wide', 'vk-key-danger');
            btn.onclick = () => hapusVK();
          } else {
            // Tampilkan harakat dengan dudukan agar mudah dilihat
            btn.innerHTML = TAMPILAN_HARAKAT[kunci] || kunci; 
            btn.onclick = () => ketikVK(kunci);
          }
          
          rowDiv.appendChild(btn);
        });
        container.appendChild(rowDiv);
      });
    }

    function ketikVK(char) {
      const input = document.getElementById('inputUraian');
      input.value += char;
    }

    function hapusVK() {
      const input = document.getElementById('inputUraian');
      input.value = input.value.slice(0, -1);
    }

    async function mulaiKuis() {
      if(dbSoal.length === 0) return;

      await Tone.start();
      if(!bgmSeq) initAudio();

      const jenis = document.getElementById('setJenis').value;
      let pilihanJumlah = document.getElementById('setJumlah').value;
      let targetJumlah = dbSoal.length;

      if (pilihanJumlah !== 'semua') {
        if (pilihanJumlah === 'bebas') {
          targetJumlah = parseInt(document.getElementById('inputJumlahBebas').value) || 5;
        } else {
          targetJumlah = parseInt(pilihanJumlah);
        }
      }

      soalAktif = dbSoal.filter(s => jenis === 'semua' || s.tipe === jenis);
      if(soalAktif.length === 0) { 
        alert("Jenis soal ini kosong di materi ini!");
        return; 
      }
      
      soalAktif.sort(() => Math.random() - 0.5);
      if(soalAktif.length > targetJumlah) soalAktif = soalAktif.slice(0, targetJumlah);

      const mode = document.getElementById('setMode').value;
      if (mode === 'cepat') {
         let dValue = document.getElementById('setDurasi').value;
         if(dValue === 'bebas') {
            durasiPerSoal = parseInt(document.getElementById('inputWaktuBebas').value) || 10;
         } else {
            durasiPerSoal = parseInt(dValue);
         }
         document.getElementById('waktuContainer').classList.remove('hidden');
      } else {
         document.getElementById('waktuContainer').classList.add('hidden');
      }

      indeksSoal = 0;
      skor = 0;
      document.getElementById('screenSetup').classList.add('hidden');
      document.getElementById('screenPlay').classList.remove('hidden');
      
      mainkanBGM(); 
      tampilSoal();
    }

    function tampilSoal() {
      clearInterval(waktuTimer);
      if (indeksSoal >= soalAktif.length) { selesaiKuis(); return; }

      const d = soalAktif[indeksSoal];
      document.getElementById('infoSoal').innerText = `Soal: ${indeksSoal + 1} / ${soalAktif.length}`;
      document.getElementById('infoSkor').innerText = `Skor: ${skor}`;

      const elTeks = document.getElementById('teksSoal');
      elTeks.classList.remove('teks-arab');
      const isArab = /[\u0600-\u06FF]/.test(d.soal);
      if(isArab) elTeks.classList.add('teks-arab');
      elTeks.innerHTML = d.soal;

      const wadahMedia = document.getElementById('tempatMedia');
      wadahMedia.innerHTML = '';
      wadahMedia.classList.add('hidden');
      
      if(d.media && d.media.trim() !== '') {
          wadahMedia.classList.remove('hidden');
          let link = d.media.trim();
          
          if(link.includes('youtube.com') || link.includes('youtu.be')) {
              let videoId = link.split('v=')[1] || link.split('youtu.be/')[1];
              if(videoId) {
                  let ampersandPosition = videoId.indexOf('&');
                  if(ampersandPosition != -1) videoId = videoId.substring(0, ampersandPosition);
                  wadahMedia.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=0" allowfullscreen></iframe>`;
              }
          } else if(link.match(/\.(jpeg|jpg|gif|png)$/i)) {
              wadahMedia.innerHTML = `<img src="${link}" alt="Ilustrasi Soal">`;
          } else {
              wadahMedia.innerHTML = `<a href="${link}" target="_blank" class="text-blue-600 underline">Buka Referensi Media</a>`;
          }
      }

      document.getElementById('areaGanda').classList.add('hidden');
      document.getElementById('areaUraian').classList.add('hidden');

      if (d.tipe === 'ganda') {
        document.getElementById('areaGanda').classList.remove('hidden');
        const area = document.getElementById('areaGanda');
        area.innerHTML = '';
        
        let opsiAcak = [...d.opsi].filter(o => o.trim() !== "");
        opsiAcak.sort(() => Math.random() - 0.5);

        opsiAcak.forEach(o => {
          const btn = document.createElement('button');
          btn.className = 'brutal-btn ' + (isArab ? 'teks-arab' : '');
          btn.style.marginBottom = "0";
          btn.innerHTML = o;
          btn.onclick = () => cekJawaban(o);
          area.appendChild(btn);
        });
      } else {
        document.getElementById('areaUraian').classList.remove('hidden');
        document.getElementById('inputUraian').value = '';
        
        // AUTO DETEKSI KEYBOARD VIRTUAL BERDASARKAN SOAL!
        renderKeyboard(isArab ? 'arab' : 'latin');
      }

      document.getElementById('wadahNotif').classList.add('hidden');
      document.getElementById('areaGanda').style.pointerEvents = 'auto'; 
      document.getElementById('virtualKeyboard').style.pointerEvents = 'auto';

      const mode = document.getElementById('setMode').value;
      if (mode === 'cepat') {
        waktuBerjalan = durasiPerSoal;
        document.getElementById('timerAngka').innerText = waktuBerjalan;
        waktuTimer = setInterval(() => {
          waktuBerjalan--;
          document.getElementById('timerAngka').innerText = waktuBerjalan;
          
          if(waktuBerjalan <= 5 && waktuBerjalan > 0) { sfxTik(); } 

          if (waktuBerjalan <= 0) {
            clearInterval(waktuTimer);
            sfxSalah(); 
            
            let kunciSebenarnya = d.jawaban;
            if(d.tipe === 'ganda') { kunciSebenarnya = konversiKunciJawaban(d.jawaban, d.opsi); }
            
            tampilkanNotif(false, "WAKTU HABIS! ⏰", "Jawaban yang benar:\n" + kunciSebenarnya);
          }
        }, 1000);
      }
    }

    function konversiKunciJawaban(kunci, opsiArray) {
       let k = kunci.toString().trim().toUpperCase();
       if(k === 'A' && opsiArray[0]) return opsiArray[0];
       if(k === 'B' && opsiArray[1]) return opsiArray[1];
       if(k === 'C' && opsiArray[2]) return opsiArray[2];
       if(k === 'D' && opsiArray[3]) return opsiArray[3];
       return kunci; 
    }

    function cekJawaban(jawabanUser) {
      clearInterval(waktuTimer);
      const d = soalAktif[indeksSoal];
      
      let kunciSebenarnya = d.jawaban;
      if(d.tipe === 'ganda') { kunciSebenarnya = konversiKunciJawaban(d.jawaban, d.opsi); }

      let teksJawab = jawabanUser.toString().trim().toLowerCase();
      let teksKunci = kunciSebenarnya.toString().trim().toLowerCase();

      // Toleransi menghapus spasi ekstra pada jawaban essay Arab/Latin
      if(d.tipe !== 'ganda') {
         teksJawab = teksJawab.replace(/\s+/g, '');
         teksKunci = teksKunci.replace(/\s+/g, '');
      }

      if (teksJawab === teksKunci) {
        sfxBenar(); 
        skor += 10;
        document.getElementById('infoSkor').innerText = `Skor: ${skor}`;
        tampilkanNotif(true, "HEBAT! BENAR! 🎉", "+10 Poin untukmu.");
      } else {
        sfxSalah(); 
        tampilkanNotif(false, "KURANG TEPAT! 😢", "Jawaban yang benar:\n" + kunciSebenarnya);
      }
    }

    function cekJawabanUraian() {
      const val = document.getElementById('inputUraian').value;
      if(val.trim() === "") { 
        alert("Ketik jawabannya dulu ya!"); 
        return; 
      }
      cekJawaban(val);
    }

    function tampilkanNotif(isBenar, judul, pesan) {
      document.getElementById('areaGanda').style.pointerEvents = 'none';
      document.getElementById('virtualKeyboard').style.pointerEvents = 'none'; // Matikan keyboard saat notif muncul

      const wadah = document.getElementById('wadahNotif');
      const judulEl = document.getElementById('judulNotif');
      const pesanEl = document.getElementById('pesanNotif');
      const btn = document.getElementById('btnLanjut');

      judulEl.innerText = judul;
      pesanEl.innerText = pesan;

      if(isBenar) {
        wadah.className = "mt-4 p-4 rounded-xl border-4 border-black font-bold text-center bg-green-400 text-black";
        btn.className = "brutal-btn success pixel-font text-sm mt-4";
      } else {
        wadah.className = "mt-4 p-4 rounded-xl border-4 border-black font-bold text-center bg-red-500 text-white";
        btn.className = "brutal-btn secondary pixel-font text-sm mt-4 text-black";
      }

      wadah.classList.remove('hidden');
    }

    function lanjutSoal() {
      indeksSoal++; 
      tampilSoal();
    }

    function selesaiKuis() {
      stopBGM(); 
      document.getElementById('screenPlay').classList.add('hidden');
      document.getElementById('screenResult').classList.remove('hidden');
      
      const maxSkor = soalAktif.length * 10;
      const nilai = (skor / maxSkor) * 100;
      
      document.getElementById('nilaiAkhir').innerText = Math.round(nilai);
      
      let pesan = "";
      if (nilai >= 90) pesan = "Luar Biasa! Kamu Jenius!";
      else if (nilai >= 70) pesan = "Bagus Sekali! Pertahankan!";
      else pesan = "Jangan menyerah, ayo belajar lagi!";
      document.getElementById('pesanHasil').innerText = pesan;

      if(nilai >= 70) {
        setTimeout(sfxBenar, 500); setTimeout(sfxBenar, 1000);
      } else {
        setTimeout(sfxSalah, 500);
      }
    }
  </script>
</body>
</html>
